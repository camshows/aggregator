name: Update Chaturbate rooms

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min
  workflow_dispatch:         # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # needed for push below

      - name: Fetch rooms
        run: |
          mkdir -p public
          curl --fail --silent --show-error \
            "https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=8.8.8.8" \
            -o public/data.json

      - name: Commit if changed
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "Update rooms data - $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "No changes or already up-to-date"
