<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CB Live Rooms</title>
  <style>
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 20px; }
    .card { border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #111; color: white; }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .info { padding: 10px; }
  </style>
</head>
<body>

<h1>Live Rooms (updated every 15 min)</h1>
<div class="grid" id="grid"></div>

<script>
fetch('public/data.json')
  .then(r => r.json())
  .then(rooms => {
    const grid = document.getElementById('grid');
    rooms.forEach(room => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <a href="https://chaturbate.com/${room.username}/?tour=${room.wm_alias || 'T2CSW'}" target="_blank">
          <img src="${room.image_url || 'https://via.placeholder.com/300x180?text=' + room.username}" alt="${room.username}">
          <div class="info">
            <strong>${room.username}</strong><br>
            ${room.age ? room.age + ' • ' : ''}${room.gender || '?'} • ${room.followers || 0} followers<br>
            <small>${room.current_show || '—'}</small>
          </div>
        </a>
      `;
      grid.appendChild(div);
    });
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
